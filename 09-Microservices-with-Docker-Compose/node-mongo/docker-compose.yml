version: "3.8"

# ============================================================
# Use Case 2: Node.js REST API + MongoDB + Nginx
# Architecture: Browser → Nginx (80) → Node.js (3000) → MongoDB
# ============================================================

services:

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"                       # Public entry point
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - frontend-network

  # ── Node.js API ───────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: node-api
    restart: always
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/devopsdb
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - frontend-network
      - backend-network

  # ── MongoDB Database ──────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: devopsdb
    volumes:
      - mongo-data:/data/db           # Persist database data
    networks:
      - backend-network               # NOT on frontend — isolated
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mongo Express (DB Admin UI) ───────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"                   # DB admin UI
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongo
    networks:
      - backend-network

# ── Named Volumes ─────────────────────────────────────────
volumes:
  mongo-data:
    driver: local

# ── Networks ──────────────────────────────────────────────
networks:
  frontend-network:    # Nginx ↔ Node.js
    driver: bridge
  backend-network:     # Node.js ↔ MongoDB (isolated)
    driver: bridge
