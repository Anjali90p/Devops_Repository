version: "3.8"

# ============================================================
# Docker Compose - Multi-Container DevOps App
# Services: Node.js App + Redis + Nginx Reverse Proxy
# ============================================================

services:

  # ── Application Service ──────────────────────────────────
  app:
    build: ./app
    container_name: node-app
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - app-network
    depends_on:
      - redis

  # ── Redis Cache ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - app-network

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app-network

# ── Networks ─────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────
volumes:
  redis-data:
    driver: local
